name: Workflow-CI Retraining and Docker Build

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject_Folder/**'
      - 'preprocessing/diabetes_preprocessing/data_clean.csv'

jobs:
  mlflow-retraining:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dagshub scikit-learn pandas numpy matplotlib seaborn

    - name: Run MLflow Project Retraining
      env:
        # Menyambungkan token akses rahasia DagsHub agar robot diizinkan masuk
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
      mlflow run MLProject_Folder --experiment-name "Eksperimen_Diabetes_Titi" --env-manager local

  docker-build-push:
    needs: mlflow-retraining
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        # Membakar model menjadi Docker Image dan melemparnya ke Docker Hub Titi
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-prediction-model:latest -f - . <<EOF
        FROM python:3.10-slim
        RUN pip install mlflow dagshub scikit-learn pandas numpy matplotlib seaborn
        COPY . /app
        WORKDIR /app/MLProject_Folder
        CMD ["python", "modelling.py"]
        EOF
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-prediction-model:latest