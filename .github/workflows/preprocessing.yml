name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    # 1. Menggunakan v4 (Pembaruan dari v3)
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Menggunakan v5 (Pembaruan dari v4)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Menginstal library
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    # 4. Mengeksekusi skrip preprocessing
    - name: Run preprocessing script
      run: |
        python preprocessing/automate_Titi_Alfiana.py

    # 5. Menyimpan kembali data yang sudah bersih
    - name: Commit and push processed data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add preprocessing/diabetes_preprocessing/data_clean.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data preprocessing updates" && git push)